---
layout: default
---

<div class="research-page">
  <div class="container-fluid">
    <div class="row">

      <!-- Sticky sidebar TOC -->
      <nav class="col-lg-3 d-none d-lg-block research-sidebar" id="research-toc">
        <div class="sticky-top pt-4">
          <h6 class="sidebar-heading text-muted">On this page</h6>
          <nav class="nav flex-column" id="toc-nav">
            <!-- Auto-populated by JS from h2 elements -->
          </nav>
        </div>
      </nav>

      <!-- Main content -->
      <main class="col-lg-9 research-content">
        <header class="research-header">
          <h1>{{ page.title }}</h1>
          {% if page.description %}
            <p class="lead text-muted">{{ page.description }}</p>
          {% endif %}
        </header>

        <article>
          {{ content }}
        </article>
      </main>

    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var headings = document.querySelectorAll('.research-content h2[id]');
  var tocNav = document.getElementById('toc-nav');

  headings.forEach(function(heading) {
    var link = document.createElement('a');
    link.className = 'nav-link toc-link';
    link.href = '#' + heading.id;
    link.textContent = heading.textContent;
    tocNav.appendChild(link);
  });

  // Highlight active section on scroll
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      var id = entry.target.getAttribute('id');
      var tocLink = tocNav.querySelector('a[href="#' + id + '"]');
      if (tocLink) {
        if (entry.isIntersecting) {
          tocNav.querySelectorAll('.toc-link').forEach(function(l) {
            l.classList.remove('active');
          });
          tocLink.classList.add('active');
        }
      }
    });
  }, { rootMargin: '-20% 0px -80% 0px' });

  headings.forEach(function(heading) { observer.observe(heading); });
});
</script>
