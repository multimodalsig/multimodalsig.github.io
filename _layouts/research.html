---
layout: default
---

<div class="research-page">
  <div class="container-fluid">
    <div class="row">
      <!-- Sticky sidebar TOC -->
      <nav class="col-lg-3 d-none d-lg-block research-sidebar" id="research-toc">
        <div class="sticky-top pt-4">
          <h6 class="sidebar-heading text-muted">On this page</h6>
          <nav class="nav flex-column" id="toc-nav">
            <!-- Auto-populated by JS from h2 elements -->
          </nav>
        </div>
      </nav>

      <!-- Main content -->
      <main class="col-lg-9 research-content">
        <header class="research-header">
          <h1>{{ page.title }}</h1>
          {% if page.description %}
          <p class="lead text-muted">{{ page.description }}</p>
          {% endif %}
        </header>

        <article>{{ content }}</article>
      </main>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var headings = document.querySelectorAll(".research-content h2[id]");
    var tocNav = document.getElementById("toc-nav");

    headings.forEach(function (heading) {
      var link = document.createElement("a");
      link.className = "nav-link toc-link";
      link.href = "#" + heading.id;
      link.textContent = heading.textContent;
      tocNav.appendChild(link);
    });

    // Highlight active section based on scroll position
    function updateActiveLink() {
      var scrollPos = window.scrollY + window.innerHeight * 0.25;
      var current = null;

      headings.forEach(function (heading) {
        if (heading.offsetTop <= scrollPos) {
          current = heading;
        }
      });

      // If scrolled to bottom, activate the last heading
      if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 2) {
        current = headings[headings.length - 1];
      }

      tocNav.querySelectorAll(".toc-link").forEach(function (l) {
        l.classList.remove("active");
      });

      if (current) {
        var activeLink = tocNav.querySelector(
          'a[href="#' + current.id + '"]',
        );
        if (activeLink) {
          activeLink.classList.add("active");
        }
      }
    }

    window.addEventListener("scroll", updateActiveLink);
    updateActiveLink();
  });
</script>
