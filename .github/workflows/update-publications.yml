name: Update Publications from Semantic Scholar

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month, 6 AM UTC
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch publications
        env:
          S2_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          python scripts/fetch_publications.py \
            --author-id 2245053 \
            --output _bibliography/papers.bib \
            --json-dump _data/publications_raw.json \
            ${S2_API_KEY:+--api-key $S2_API_KEY}

      - name: Commit if changed
        run: |
          git diff --quiet _bibliography/papers.bib && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _bibliography/papers.bib _data/publications_raw.json
          git commit -m "chore: update publications [$(date +%Y-%m-%d)]"
          git push
